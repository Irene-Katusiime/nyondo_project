<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nyondo sales</title>
    <link rel="stylesheet" href="sales.css" />
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <h2>Nyondo Stock</h2>
      <a href="#">Dashboard</a>
      <a href="#">Stock</a>
      <a href="#" class="active">Sales</a>
      <a href="#">Suppliers</a>
      <a href="#">Deposits</a>
    </div>

    <!-- Main content -->
    <div class="main">
      <h1>Sales Management</h1>

      <!-- sales form -->
      <div class="form-container">
        <h2>Record Sale</h2>

        <form>
             <div class="form-group">
            <label>Date</label>
            <input type="date"/>
          </div>

          <div class="form-group">
            <label>Item Name</label>
            <input type="text" placeholder="Enter item name"/>
          </div>

          <div class="form-group">
            <label>Quantity</label>
            <input type="number" placeholder="Enter quantity"/>
          </div>

          <div class="form-group">
            <label>Unit Price (UGX)</label>
            <input type="number" placeholder="Enter price"/>
          </div>

          <div class="form-group">
            <label>Customer Name</label>
            <input type="text" placeholder="Enter customer name"/>
          </div>

          <div class="form-group">
            <label>Customer Contact</label>
            <input type="number" placeholder="Enter customer contact"/>
          </div>

          <button type="submit">Add Sale</button>

        </form>
      </div>

      <!-- Sales Table -->
       <div class="table-container">
    <h2>Sales Records</h2>

    <table>
      
        <tr>
          <th>Item</th>
          <th>Quantity</th>
          <th>Price (UGX)</th>
          <th>Total</th>
        </tr>
      

      <tbody>
        <tr>
          <td>Cement</td>
          <td>10</td>
          <td>15000</td>
          <td>150000</td>
        </tr>

        <tr>
          <td>Iron Sheets</td>
          <td>5</td>
          <td>40000</td>
          <td>200000</td>
        </tr>
      </tbody>
    </table>
  </div>

    </div>
  </body>
</html>
